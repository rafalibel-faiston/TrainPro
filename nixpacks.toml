# Configuração de build do Railway/Nixpacks para o serviço único (backend + web).
# `npm run build` (na raiz) instala e builda os subprojetos backend/ e web/;
# `npm start` roda as migrations e sobe a API, que também serve o build do web.

[phases.install]
cmds = ['npm install']

[phases.build]
cmds = ['npm run build']

[start]
cmd = 'npm start'
